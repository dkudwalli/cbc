services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MYSQL_DATABASE:-cbc}
      MARIADB_USER: ${MYSQL_USER:-cbc}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD:-cbc}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-localroot}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_520_ci
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - db_data:/var/lib/mysql

  app:
    image: wordpress:php8.2-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WP_DB_NAME: ${WP_DB_NAME:-cbc}
      WP_DB_USER: ${WP_DB_USER:-cbc}
      WP_DB_PASSWORD: ${WP_DB_PASSWORD:-cbc}
      WP_DB_HOST: ${WP_DB_HOST:-db:3306}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-cbc_}
      WP_HOME: ${WP_HOME:-http://localhost:8080}
      WP_SITEURL: ${WP_SITEURL:-http://localhost:8080}
      WP_ENV: ${WP_ENV:-local}
      WP_DEBUG: ${WP_DEBUG:-1}
      WP_DEBUG_LOG: ${WP_DEBUG_LOG:-1}
      WP_DEBUG_DISPLAY: ${WP_DEBUG_DISPLAY:-0}
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/wp-config.local.php:/var/www/html/wp-config.php

  wpcli:
    image: wordpress:cli-php8.2
    depends_on:
      db:
        condition: service_healthy
    environment:
      WP_DB_NAME: ${WP_DB_NAME:-cbc}
      WP_DB_USER: ${WP_DB_USER:-cbc}
      WP_DB_PASSWORD: ${WP_DB_PASSWORD:-cbc}
      WP_DB_HOST: ${WP_DB_HOST:-db:3306}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-cbc_}
      WP_HOME: ${WP_HOME:-http://localhost:8080}
      WP_SITEURL: ${WP_SITEURL:-http://localhost:8080}
      WP_ENV: ${WP_ENV:-local}
      WP_DEBUG: ${WP_DEBUG:-1}
      WP_DEBUG_LOG: ${WP_DEBUG_LOG:-1}
      WP_DEBUG_DISPLAY: ${WP_DEBUG_DISPLAY:-0}
    user: "33:33"
    entrypoint: ["wp"]
    volumes:
      - ./:/var/www/html
      - ./docker/wp-config.local.php:/var/www/html/wp-config.php

volumes:
  db_data:
